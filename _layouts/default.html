<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | SACSAB</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            line-height: 1.7;
            margin: 0;
            color: #1a1a1a;
            background: #f7f9fc;
        }

        h1,
        h2,
        h3 {
            color: #002b5c;
            margin-top: 0;
            letter-spacing: 0.5px;
        }

        p {
            color: #444;
        }

        a {
            color: #0056b3;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        header {
            background: #001f45;
            color: white;
            padding: 0 10%;
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        }

        .logo {
            font-size: 1.6rem;
            letter-spacing: 1.5px;
            font-weight: 700;
            text-transform: uppercase;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 30px;
        }

        nav a {
            color: white;
            font-weight: 500;
            transition: 0.25s;
        }

        nav a:hover {
            color: #4da3ff;
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
        }

        .menu-toggle span {
            width: 26px;
            height: 3px;
            background: white;
            border-radius: 2px;
        }

        .hero {
            background: linear-gradient(135deg, #e8eef5, #f4f7fa);
            padding: 5rem 10%;
            text-align: center;
            border-bottom: 4px solid #003d80;
        }

        .hero h1 {
            font-size: 2.8rem;
            margin-bottom: 0.5rem;
        }

        .tagline {
            color: #555;
            font-style: italic;
            font-size: 1.2rem;
        }

        .container {
            padding: 4rem 10%;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            border: 1px solid #e2e6ea;
            padding: 2rem;
            border-radius: 12px;
            background: #ffffff;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.1);
        }

        footer {
            background: #3f3f3f;
            color: #bbb;
            text-align: center;
            padding: 3rem 10%;
            margin-top: 4rem;
            font-size: 0.9rem;
            border-top: 3px solid #003d80;
        }

        footer p {
            margin: 0.3rem 0;
        }

        @media (max-width: 768px) {
            header {
                padding: 0 5%;
                height: 70px;
            }

            .logo {
                font-size: 1.3rem;
            }

            .menu-toggle {
                display: flex;
            }

            nav ul {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 70px;
                left: 0;
                width: 100%;
                background: #001f45;
                padding: 20px 0;
                text-align: center;
                border-top: 1px solid #003a7a;
                box-shadow: 0 10px 15px rgba(0, 0, 0, 0.3);
            }

            nav ul.active {
                display: flex;
            }

            nav ul li {
                padding: 15px 0;
            }

            .hero {
                padding: 3rem 5%;
            }

            .hero h1 {
                font-size: 2rem;
            }

            .container {
                padding: 2rem 5%;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">SACSAB | Swedish Airspace Control Systems AB</div>

        <nav>
            <ul id="nav-list">
                <li><a href="/">Home</a></li>
                <li><a href="/about/">About</a></li>
                <li><a href="/products/">Our Products</a></li>
                <li><a href="/news/">News</a></li>
                <li><a href="/contact/">Contact</a></li>
            </ul>
        </nav>

        <div class="menu-toggle" id="mobile-menu">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <p>&copy; 2026 Swedish Airspace Control Systems AB (SACSAB). Uppsala, Sweden.</p>
        <p>Org.nr: 559574-3773</p>
    </footer>

    <script>
        const menuBtn = document.getElementById('mobile-menu');
        const navList = document.getElementById('nav-list');

        menuBtn.addEventListener('click', () => {
            navList.classList.toggle('active');
        });

        document.querySelectorAll('nav a').forEach(link => {
            link.addEventListener('click', () => {
                navList.classList.remove('active');
            });
        });
    </script>

</body>

</html>
