<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | SACSAB</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            line-height: 1.6;
            margin: 0;
            color: #333;
            background: #fdfdfd;
        }

        /* HEADER LAYOUT */
        header {
            background: #002b5c;
            color: white;
            padding: 0 10%;
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.5rem;
            letter-spacing: 1px;
            font-weight: bold;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 25px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }

        nav a:hover {
            color: #4da3ff;
        }
    
        .menu-toggle {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
            z-index: 1001;
        }

        .menu-toggle span {
            width: 25px;
            height: 3px;
            background: white;
            border-radius: 2px;
        }

        .hero {
            background: #f4f7f9;
            padding: 5rem 10%;
            text-align: center;
            border-bottom: 5px solid #0056b3;
        }

        .hero h1 {
            font-size: 2.8rem;
            color: #002b5c;
            margin: 0;
        }

        .tagline {
            color: #555;
            font-style: italic;
            font-size: 1.2rem;
        }

        .container {
            padding: 4rem 10%;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            border: 1px solid #eee;
            padding: 2rem;
            border-radius: 12px;
            background: #fff;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        footer {
            background: #1a1a1a;
            color: #aaa;
            text-align: center;
            padding: 3rem;
            margin-top: 4rem;
            font-size: 0.9rem;
        }

        /* MOBILE RESPONSIVE LOGIC */
        @media (max-width: 768px) {
            header {
                padding: 0 5%;
                height: 70px;
                position: relative;
            }

            .logo {
                position: absolute;
                left: 5%;
                top: 50%;
                transform: translateY(-50%);
            }

            .menu-toggle {
                display: flex;
                position: absolute;
                right: 5%;
                top: 50%;
                transform: translateY(-50%);
            }

            nav {
                width: 100%;
            }

            /* Style the mobile dropdown */
            nav ul {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 70px;
                left: 0;
                width: 100%;
                background: #002b5c;
                padding: 20px 0;
                text-align: center;
                border-top: 1px solid #003a7a;
                box-shadow: 0 10px 15px rgba(0, 0, 0, 0.3);
            }

            nav ul.active {
                display: flex;
            }

            nav ul li {
                padding: 15px 0;
            }

            .hero {
                padding: 3rem 5%;
            }

            .hero h1 {
                font-size: 1.8rem;
            }

            .container {
                padding: 2rem 5%;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">SACSAB</div>

        <nav>
            <ul id="nav-list">
                <li><a href="/">Home</a></li>
                <li><a href="/about/">About</a></li>
                <li><a href="/products/">Our Products</a></li>
                <li><a href="/news/">News</a></li>
                <li><a href="/contact/">Contact</a></li>
            </ul>
        </nav>

        <div class="menu-toggle" id="mobile-menu">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <p>&copy; 2026 Swedish Airspace Control Systems AB (SACSAB). Uppsala, Sweden.</p>
        <p>Contact: david.olmedo@sacsab.com</p>
    </footer>

    <script>
        const menuBtn = document.getElementById('mobile-menu');
        const navList = document.getElementById('nav-list');

        menuBtn.addEventListener('click', function () {
            navList.classList.toggle('active');
        });

        document.querySelectorAll('nav a').forEach(link => {
            link.addEventListener('click', () => {
                navList.classList.remove('active');
            });
        });
    </script>

</body>

</html>
